name: Build & Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Every Monday at 08:00 UTC — catches EAP breakage before it ships
    - cron: '0 8 * * 1'

jobs:
  # ── Standard build against the pinned platform version ────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4.6.2
        with:
          name: plugin-zip
          path: build/distributions/*.zip

  # ── Forward compatibility check against a newer stable platform ────────────
  # Runs on every push AND on the weekly schedule.
  # Tests against a platform version ahead of the pinned dev version so you
  # get advance warning of API deprecations before users on newer IDEs hit them.
  #
  # Why not LATEST-EAP-SNAPSHOT: that token does not configure the compile
  # classpath correctly with org.jetbrains.intellij 1.x — all platform classes
  # appear missing and you get 90+ "cannot find symbol" errors unrelated to real
  # API changes. Use a concrete stable version string instead.
  # Update this version when JetBrains ships a new major release.
  forward-compat:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build against newer stable platform
        run: ./gradlew buildPlugin --no-daemon -PplatformVersion=2024.3

      - name: Warn on forward-compat failure
        if: failure()
        run: |
          echo "::warning::Forward compatibility check failed against platformVersion=2024.3. Review https://blog.jetbrains.com/platform for deprecated API changes and update before releasing."
