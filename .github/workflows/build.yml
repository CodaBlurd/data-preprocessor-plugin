name: Build & Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Every Monday at 08:00 UTC — catches EAP breakage before it ships
    - cron: '0 8 * * 1'

jobs:
  # ── Standard build against the pinned platform version ────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: build/distributions/*.zip

  # ── Compatibility check against the latest EAP build ──────────────────────
  # Runs on every push AND on the weekly schedule.
  # marked continue-on-error so it never blocks a PR merge on pre-release breakage.
  eap-compat:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build against latest EAP
        # Override platformVersion with the current EAP series.
        # Update this value when a new EAP cycle starts.
        # Track releases at: https://blog.jetbrains.com/platform
        run: ./gradlew buildPlugin --no-daemon -PplatformVersion=2025.1-EAP

      - name: Warn on EAP failure
        if: failure()
        run: |
          echo "::warning::EAP compatibility check failed. Review the JetBrains Platform changelog at https://blog.jetbrains.com/platform and address deprecated API usages before the EAP ships."
