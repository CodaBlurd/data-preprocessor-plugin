version: 2

updates:
  # ── Maven / Gradle dependencies ────────────────────────────────────────────
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"         # Dependabot opens a PR if a newer version exists
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    ignore:
      # Pin the IntelliJ Platform version manually — auto-bumping it without
      # running ./gradlew runIde first can introduce breaking API changes.
      - dependency-name: "org.jetbrains.intellij"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

      # Gradle wrapper must stay on 8.x — org.jetbrains.intellij 1.x is
      # incompatible with Gradle 9+ (removed DefaultArtifactPublicationSet).
      # Upgrading requires migrating to org.jetbrains.intellij.platform 2.x.
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
